unbind C-b
set -g prefix C-a

set -s copy-command 'pbcopy'

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

set -g status-position top

set -sg escape-time 1

set -g base-index 1
setw -g pane-base-index 1
# setw window-active-style 'bg=colour238'

bind r source-file ~/.tmux.conf \; display "Reloaded!"

bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# bind -r C-h select-window -t :-
# bind -r C-l select-window -t :+

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

set-option -g mouse on

setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection

bind t popup -xC -yC -w80% -h80% -d '#{pane_current_path}' -E 'lazygit'
bind Space popup -xC -yC -w95% -h95% -E 'tmux a -t popup || tmux new -s popup'
bind T clock-mode


bind e if-shell -F "#{==:#{pane_synchronized},0}" "set synchronize-panes on" "set synchronize-panes off"

# Previous colors (kept for easy rollback)
# set -g mode-style "bg=colour240,fg=colour250"
# set -g window-style 'fg=white,bg=colour237'
# set -g window-active-style 'fg=colour015,bg=colour234'

set -g mode-style "bg=#7aa2f7,fg=#1a1b26"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'janoamaral/tokyo-night-tmux'

# Pane dimming: inactive is darker and text is dimmed (tokyo-night palette)
set -g window-style 'fg=#565f89,bg=#1a1a1a'
set -g window-active-style 'fg=#c0caf5,bg=#050505'
set -g @continuum-restore 'on'        # tmux起動時に自動復元
set -g @continuum-save-interval '5'



## Auto-start tmuxinator sessions on server start
run-shell "tmux has-session -t conv-apps 2>/dev/null || /opt/homebrew/bin/tmuxinator start conv-apps --no-attach"
run-shell "tmux has-session -t conv-formation 2>/dev/null || /opt/homebrew/bin/tmuxinator start conv-formation --no-attach"
run-shell "tmux has-session -t conv-digdag 2>/dev/null || /opt/homebrew/bin/tmuxinator start conv-digdag --no-attach"

## must be end of file
run '~/.tmux/plugins/tpm/tpm'
