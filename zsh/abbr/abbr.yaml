# Applied as shell aliases (transparent command overrides).
alias:
  vim:    nvim
  less:   bat
  cat:    "bat --paging=never"
  grep:   rg
  python: python3

git:
  ga:   "git add"
  gs:   "git status"
  gc:   "git commit -m"
  gch:  "git checkout"
  gcb:  "git checkout $(git branch | fzf)"
  gcm:  "git checkout master"
  gam:  "git commit --amend"
  gp:   "git push origin head"
  gst:  "git stash"
  gpop: "git stash pop"
  gl:   "git log --oneline"
  gd:   "git diff"
  gti:  "git"

tools:
  k:     "kubectl"
  tf:    "terraform"
  dp:    "docker-compose"
  tm:    "tmux"
  mux:   "tmuxinator"
  telij: "/Applications/IntelliJ\\ IDEA.app/Contents/MacOS/idea"
  lg:    "lazygit"
  ch:    "chrome-cli"

shell:
  la:   "ls -a"
  lla:  "ls -al"
  ei:   "exit"
  "..":   "cd ../"
  "...":  "cd ../.."
  "....": "cd ../../.."

work:
  stg:  "ssh conv-stg-2"
  prod: "ssh conv-prod-2"

claude:
  c: "claude"

# Registered as abbr -g (expand anywhere in the command line).
global:
  G: "| grep"
  C: "| claude"
